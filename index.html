<h2>Aegis Sentinel</h2>
<p><a href="https://python.org"><img src="https://img.shields.io/badge/Python-3.11+-blue.svg" alt="Python Version"></a>
<a href="LICENSE"><img src="https://img.shields.io/badge/License-MIT-green.svg" alt="License: MIT"></a>
<a href="https://github.com/PkLavc/aegis-sentinel"><img src="https://img.shields.io/github/stars/PkLavc/aegis-sentinel?style=social" alt="GitHub Stars"></a></p>
<h2>Executive Summary</h2>
<p>Aegis Sentinel is a high-reliability infrastructure monitoring and auto-healing engine designed to ensure business continuity and infrastructure resilience in enterprise environments. This system implements advanced anomaly detection algorithms and automated recovery mechanisms to prevent catastrophic downtime in digital services.</p>
<h2>Engineering Specifications</h2>
<h3>Technical Architecture</h3>
<p>Aegis Sentinel employs a modular, service-oriented architecture with three core components:</p>
<ol>
<li><strong>Monitor Service</strong>: Real-time system metrics collection</li>
<li><strong>ML-Anomaly Detection</strong>: Machine learning-based anomaly identification</li>
<li><strong>Recovery Engine</strong>: Automated remediation and healing actions</li>
</ol>
<h3>Core Technologies</h3>
<ul>
<li><strong>Python 3.11+</strong> with strict type hinting</li>
<li><strong>Structured JSON logging</strong> for enterprise auditability</li>
<li><strong>Isolation Forest</strong> and statistical anomaly detection</li>
<li><strong>Docker container management</strong> for automated recovery</li>
<li><strong>Comprehensive testing</strong> with pytest framework</li>
</ul>
<h3>Engineering Impact Metrics</h3>
<table>
<thead><tr><th>Metric</th><th>Target</th><th>National Interest Benefit</th></tr></thead>
<tbody>
<tr><td><strong>Detection Latency</strong></td><td>&lt; 2.0s</td><td>Real-time response to critical failures</td></tr>
<tr><td><strong>False Positive Rate</strong></td><td>&lt; 5%</td><td>Minimizes operational disruption</td></tr>
<tr><td><strong>Recovery Success</strong></td><td>&gt; 95%</td><td>Ensures high availability for essential services</td></tr>
</tbody></table>
<h2>Installation</h2>
<pre><code>git clone https://github.com/PkLavc/aegis-sentinel.git
cd aegis-sentinel
python -m venv venv
source venv/bin/activate  # On Windows: venv\Scripts\activate
pip install -r requirements.txt</code></pre>
<h2>Usage</h2>
<h3>Basic Usage</h3>
<pre><code>from src.main import AegisSentinel

sentinel = AegisSentinel()
await sentinel.start()</code></pre>
<h3>Advanced Configuration</h3>
<pre><code>from src.main import AegisSentinel
from src.monitor import MonitoringConfig
from src.detector import DetectionConfig
from src.healer import RecoveryConfig

monitoring_config = MonitoringConfig(
    collection_interval=5.0,
    api_endpoints=["https://api.example.com/health"],
    enable_network_monitoring=True
)

detection_config = DetectionConfig(
    isolation_contamination=0.1,
    statistical_threshold_multiplier=3.0,
    min_samples_for_detection=50
)

recovery_config = RecoveryConfig(
    enable_docker_recovery=True,
    max_concurrent_actions=3
)

sentinel = AegisSentinel(
    monitoring_config=monitoring_config,
    detection_config=detection_config,
    recovery_config=recovery_config
)
await sentinel.start()</code></pre>
<h2>Configuration Options</h2>
<h3>Monitoring Configuration</h3>
<ul>
<li><code>collection_interval</code>: Time between metric collections (default: 5.0 seconds)</li>
<li><code>api_endpoints</code>: List of API endpoints to monitor</li>
<li><code>enable_network_monitoring</code>: Enable network metrics collection</li>
<li><code>enable_disk_monitoring</code>: Enable disk usage monitoring</li>
</ul>
<h3>Detection Configuration</h3>
<ul>
<li><code>isolation_contamination</code>: Expected proportion of anomalies (default: 0.1)</li>
<li><code>statistical_threshold_multiplier</code>: Std deviation multiplier (default: 3.0)</li>
<li><code>min_samples_for_detection</code>: Minimum samples before detection starts (default: 50)</li>
</ul>
<h3>Recovery Configuration</h3>
<ul>
<li><code>enable_docker_recovery</code>: Enable Docker container restart recovery</li>
<li><code>enable_cache_recovery</code>: Enable cache flushing recovery</li>
<li><code>max_concurrent_actions</code>: Maximum concurrent recovery actions (default: 3)</li>
<li><code>action_timeout</code>: Default timeout for recovery actions (default: 120.0 seconds)</li>
</ul>
<h2>Testing</h2>
<pre><code>python run_tests.py
pytest tests/</code></pre>
<h2>Logging</h2>
<p>Aegis Sentinel uses structured JSON logging for enterprise auditability:</p>

  <script>
    document.getElementById('simulate').addEventListener('click', function () {
      var lines = ['[monitor] cpu_usage=94%','[detector] anomaly=true threshold=89%','[healer] action=restart_service target=api-gateway','[status] recovery=success in 1.9s'];
      document.getElementById('out').textContent = lines.join('\n');
    });
    function sparkline(values) {
      if (!Array.isArray(values) || values.length === 0) return 'n/a';
      var ticks = ['_','-','=','+','*','#','%','@'];
      var min = Math.min.apply(null, values), max = Math.max.apply(null, values);
      if (min === max) return values.map(function () { return '+'; }).join('');
      return values.map(function (v) { var idx = Math.floor(((v - min) / (max - min)) * (ticks.length - 1)); return ticks[idx]; }).join('');
    }
    async function loadBackendSimulation() {
      var statusOut = document.getElementById('api-out');
      var historyOut = document.getElementById('api-history');
      statusOut.textContent = 'Loading api/status.json...';
      historyOut.textContent = 'Loading api/history.json...';
      try {
        var statusResponse = await fetch('./api/status.json?ts=' + Date.now(), { cache: 'no-store' });
        if (!statusResponse.ok) throw new Error('status endpoint unavailable (HTTP ' + statusResponse.status + ')');
        statusOut.textContent = JSON.stringify(await statusResponse.json(), null, 2);
      } catch (error) { statusOut.textContent = 'backend simulation unavailable: ' + error.message; }
      try {
        var historyResponse = await fetch('./api/history.json?ts=' + Date.now(), { cache: 'no-store' });
        if (!historyResponse.ok) throw new Error('history endpoint unavailable (HTTP ' + historyResponse.status + ')');
        var historyData = await historyResponse.json();
        if (!Array.isArray(historyData)) throw new Error('invalid history payload format');
        var recent = historyData.slice(-10);
        var latency = recent.map(function (item) { return Number(item.latencyMs) || 0; });
        var success = recent.map(function (item) { return Number(item.successRate) || 0; });
        var lines = [];
        lines.push('history points: ' + historyData.length);
        lines.push('latency trend: ' + sparkline(latency) + ' (ms)');
        lines.push('success trend: ' + sparkline(success) + ' (%)');
        lines.push('recent entries:');
        recent.forEach(function (item) { lines.push('- ' + item.timestamp + ' | latency=' + item.latencyMs + 'ms | success=' + item.successRate + '% | events=' + item.eventsProcessed); });
        historyOut.textContent = lines.join('\n');
      } catch (error) { historyOut.textContent = 'history unavailable: ' + error.message; }
    }
    document.getElementById('load-api').addEventListener('click', loadBackendSimulation);
    loadBackendSimulation();
    (function(){document.querySelectorAll('[data-current-year]').forEach(function(n){n.textContent=String(new Date().getFullYear());});})();
  </script>
